# Alembic — UrbanRelief backend (see alembic/env.py for DATABASE_URL from .env)

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Overridden in env.py from DATABASE_URL (escape % for ConfigParser)
sqlalchemy.url = postgresql://placeholder:placeholder@localhost:5432/placeholder

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
